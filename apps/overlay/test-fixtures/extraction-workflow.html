<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Web Seek Extraction Fixture</title>
    <style>
      body {
        margin: 0;
        background: #f7f8fb;
        color: #172033;
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 920px;
        margin: 32px auto;
        padding: 0 20px 48px;
      }

      form {
        display: flex;
        gap: 8px;
        margin-bottom: 18px;
      }

      input,
      button {
        border: 1px solid #b8c7d9;
        border-radius: 4px;
        padding: 8px 10px;
        font: inherit;
      }

      button {
        background: #0f766e;
        color: white;
        font-weight: 700;
      }

      .results {
        display: grid;
        gap: 10px;
      }

      .result-card {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: white;
        padding: 14px;
      }

      .result-card[hidden] {
        display: none;
      }

      .result-card h2 {
        margin: 0 0 4px;
        font-size: 18px;
      }

      .license {
        display: inline-block;
        margin-top: 6px;
        border-radius: 3px;
        background: #e0f2fe;
        padding: 2px 6px;
        font-size: 12px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Licensed Engineers</h1>
      <form role="search" data-testid="search-form">
        <input name="q" aria-label="Search engineers" placeholder="Search engineers" />
        <button type="submit" data-testid="search-submit">Search</button>
      </form>

      <section class="results" aria-label="Search results">
        <article class="result-card" data-testid="result-card" data-keywords="engineer civil active">
          <h2 data-testid="result-name">Avery Stone</h2>
          <a href="/licenses/avery-stone" data-testid="result-profile">Profile</a>
          <p data-testid="result-summary">Civil engineer with active public license.</p>
          <span class="license" data-testid="result-status">Active</span>
        </article>
        <article class="result-card" data-testid="result-card" data-keywords="engineer electrical active">
          <h2 data-testid="result-name">Blair Chen</h2>
          <a href="/licenses/blair-chen" data-testid="result-profile">Profile</a>
          <p data-testid="result-summary">Electrical engineer with active public license.</p>
          <span class="license" data-testid="result-status">Active</span>
        </article>
        <article class="result-card" data-testid="result-card" data-keywords="surveyor inactive">
          <h2 data-testid="result-name">Casey Rivera</h2>
          <a href="/licenses/casey-rivera" data-testid="result-profile">Profile</a>
          <p data-testid="result-summary">Surveyor record included for filtering tests.</p>
          <span class="license" data-testid="result-status">Inactive</span>
        </article>
      </section>

      <nav aria-label="Pagination">
        <button type="button" data-testid="next-page" aria-label="Next page">Next</button>
      </nav>
    </main>

    <script>
      document.querySelector("[data-testid='search-form']").addEventListener("submit", (event) => {
        event.preventDefault();
        const query = new FormData(event.currentTarget).get("q").toString().toLowerCase();
        for (const card of document.querySelectorAll("[data-testid='result-card']")) {
          card.hidden = query.length > 0 && !card.dataset.keywords.includes(query);
        }
      });
    </script>
  </body>
</html>
